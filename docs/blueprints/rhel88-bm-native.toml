# Minimal RHEL 8.8 blueprint: UEFI + serial console + OCI boot path + MLX5 RDMA.
# No SSH keys — OCI injects authorized_keys via instance metadata.

name = "rhel88-bm-native"
description = "RHEL 8.8 minimal for OCI BM native UEFI + RDMA"
version = "1.0.0"
distro = "rhel-88"

modules = []
groups = []

[[packages]]
name = "kernel"
version = "*"

[[packages]]
name = "kernel-core"
version = "*"

[[packages]]
name = "kernel-modules"
version = "*"

[[packages]]
name = "NetworkManager"
version = "*"

[[packages]]
name = "openssh-server"
version = "*"

[[packages]]
name = "dracut-config-generic"
version = "*"

[[packages]]
name = "dracut-network"
version = "*"

[[packages]]
name = "grub2-efi-x64"
version = "*"

[[packages]]
name = "efibootmgr"
version = "*"

[[packages]]
name = "nvme-cli"
version = "*"

[[packages]]
name = "iscsi-initiator-utils"
version = "*"

[[packages]]
name = "rdma-core"
version = "*"

[[packages]]
name = "libibverbs"
version = "*"

[[packages]]
name = "libmlx5"
version = "*"

[customizations.kernel]
append = "rd.iscsi.firmware=1 rd.iscsi.ibft=1 crashkernel=1G-4G:192M,4G-64G:256M,64G-:512M console=ttyS0,115200n8 net.ifnames=0 biosdevname=0"

[customizations.services]
enabled = ["sshd", "NetworkManager", "rdma"]

[customizations]
bootloader = { type = "uefi" }

[[customizations.files]]
path = "/etc/default/grub"
mode = "0644"
user = "root"
group = "root"
data = '''
GRUB_TIMEOUT=5
GRUB_DISTRIBUTOR="Red Hat Enterprise Linux"
GRUB_DEFAULT=saved
GRUB_DISABLE_SUBMENU=true
GRUB_TERMINAL_OUTPUT="console"
GRUB_CMDLINE_LINUX="crashkernel=auto console=ttyS0,115200n8 net.ifnames=0 biosdevname=0"
GRUB_DISABLE_RECOVERY="true"
'''

[[customizations.files]]
path = "/etc/dracut.conf.d/uefi.conf"
mode = "0644"
user = "root"
group = "root"
data = "uefi=yes\n"

[[customizations.files]]
path = "/etc/dracut.conf.d/rdma.conf"
mode = "0644"
user = "root"
group = "root"
data = '''
add_drivers+=" mlx5_core ib_core ib_ipoib rdma_ucm ib_umad nvme nvme_rdma "
omit_drivers+=" nvme_tcp "
'''
