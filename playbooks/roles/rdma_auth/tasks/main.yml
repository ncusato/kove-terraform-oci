---
- name: Install nm-cloud-setup support
  ansible.builtin.dnf:
    name:
      - NetworkManager-config-server
      - NetworkManager-cloud-setup
    state: present

- name: Ensure nm-cloud-setup drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/nm-cloud-setup.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Drop-in for nm-cloud-setup (enable OCI + debug)
  ansible.builtin.copy:
    dest: /etc/systemd/system/nm-cloud-setup.service.d/oci.conf
    content: |
      [Service]
      Environment=NM_CLOUD_SETUP_OCI=yes
      Environment=NM_CLOUD_SETUP_LOG=TRACE
    owner: root
    group: root
    mode: "0644"

- name: Reload systemd & enable nm-cloud-setup
  ansible.builtin.systemd:
    name: nm-cloud-setup.service
    enabled: true
    state: started
    daemon_reload: true

# SELinux context noted in your steps
- name: Set SELinux fcontext for /var/run/oci-cn-auth
  ansible.builtin.command: semanage fcontext -a -t NetworkManager_etc_t "/var/run/oci-cn-auth(/.*)?"
  args: { warn: false }
  changed_when: true
  failed_when: false

- name: restorecon
  ansible.builtin.command: restorecon -vFR /var/run/oci-cn-auth
  changed_when: true
  failed_when: false

# oci-cn-auth (try multiple regional object-storage URLs; override oci_cn_auth_rpm_urls if needed)
- name: Install oci-cn-auth rpm from regional URLs
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
  loop: "{{ oci_cn_auth_rpm_urls }}"
  register: oci_cn_auth_install_attempts
  failed_when: false

- name: Fail if oci-cn-auth could not be installed from any URL
  ansible.builtin.assert:
    that:
      - oci_cn_auth_install_attempts.results | selectattr('failed', 'equalto', false) | list | length > 0
    fail_msg: >-
      oci-cn-auth install failed for all URLs. Check network and override oci_cn_auth_rpm_urls
      (see roles/rdma_auth/defaults/main.yml).

- name: Check whether oci-cn-auth systemd unit exists
  ansible.builtin.command: systemctl list-unit-files oci-cn-auth.service --no-legend --no-pager
  register: oci_cn_auth_unit_check
  changed_when: false
  failed_when: false

- name: Restart oci-cn-auth service (when unit exists)
  ansible.builtin.systemd:
    name: oci-cn-auth.service
    state: restarted
    enabled: true
  when: oci_cn_auth_unit_check.rc == 0

- name: First-time RDMA auth (OCA)
  ansible.builtin.command: "oci-cn-auth --interface {{ rdma_interface }}"
  register: auth_out
  changed_when: "'AUTHENTICATING' in auth_out.stdout or 're-authentication' in auth_out.stdout"
  failed_when: false

- name: Ensure /var/run/oci-cn-auth directory is accessible
  ansible.builtin.file:
    path: /var/run/oci-cn-auth
    state: directory
    mode: "0755"
  when: auth_out is changed or auth_out.rc == 0

- name: Brief pause for oci-cn-auth to write client.p12
  ansible.builtin.pause:
    seconds: 5
  when: auth_out is changed or auth_out.rc == 0

- name: Stat client.p12 (created by oci-cn-auth)
  ansible.builtin.stat:
    path: /var/run/oci-cn-auth/client.p12
  register: client_p12_stat
  when: auth_out is changed or auth_out.rc == 0
  failed_when: false

- name: Fix client.p12 permissions so services can read it
  ansible.builtin.command: chmod 644 /var/run/oci-cn-auth/client.p12
  when: (auth_out is changed or auth_out.rc == 0) and (client_p12_stat is defined and client_p12_stat.stat.exists)
  changed_when: true
  failed_when: false

- name: Set SELinux context on client.p12 so wpa_supplicant can read it
  ansible.builtin.command: chcon -t cert_t /var/run/oci-cn-auth/client.p12
  when: (auth_out is changed or auth_out.rc == 0) and ansible_selinux.status != "disabled"
  changed_when: true
  failed_when: false

- name: Restart wpa_supplicant for RDMA interface (apply cert / 802.1X)
  ansible.builtin.systemd:
    name: "wpa_supplicant-wired@{{ rdma_interface }}.service"
    state: restarted
  failed_when: false
  when: auth_out is changed or auth_out.rc == 0

- name: Re-run oci-cn-auth after wpa_supplicant restart
  ansible.builtin.command: "oci-cn-auth --interface {{ rdma_interface }}"
  when: auth_out is changed or auth_out.rc == 0
  changed_when: false
  failed_when: false

- name: Create re-auth script
  ansible.builtin.copy:
    dest: /usr/local/bin/oci-cn-auth-refresh.sh
    mode: "0755"
    content: |
      #!/bin/bash
      LOGFILE="/var/log/oci-cn-auth-cron.log"
      DATE=$(date '+%Y-%m-%d %H:%M:%S')
      echo "[$DATE] Running oci-cn-auth refresh on {{ rdma_interface }}" >> $LOGFILE
      /usr/bin/oci-cn-auth --interface {{ rdma_interface }} >> $LOGFILE 2>&1

# Use a systemd timer for an exact 1h45m cadence (cron can't do */105 reliably)
- name: Install systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/oci-cn-auth-refresh.service
    mode: "0644"
    content: |
      [Unit]
      Description=Re-authenticate OCI RDMA interface
      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/oci-cn-auth-refresh.sh

- name: Install systemd timer (every 105 minutes)
  ansible.builtin.copy:
    dest: /etc/systemd/system/oci-cn-auth-refresh.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Run OCI RDMA re-auth every 105 minutes
      [Timer]
      OnBootSec=5min
      OnUnitActiveSec=105min
      Persistent=true
      [Install]
      WantedBy=timers.target

- name: Enable timer
  ansible.builtin.systemd:
    name: oci-cn-auth-refresh.timer
    enabled: true
    state: started

- name: Quick RDMA ping check
  ansible.builtin.command: "ping -I {{ rdma_interface }} -c 3 {{ rdma_ping_target }}"
  register: ping_out
  changed_when: false
  failed_when: false

